# Config local / CI — ajuste project_id ao vincular ao projeto remoto (`supabase link`).
project_id = "fitrank"

[api]
enabled = true

# Edge Functions: use [functions.nome] (verify_jwt, etc.). Não use [functions].enabled — a CLI espera mapas por função.
[functions.admin-users]
verify_jwt = true

[functions.admin-moderation]
verify_jwt = true

[functions.admin-tenants]
verify_jwt = true
