<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <title>FitRank</title>
    <meta name="description" content="Ranking fitness com amigos. Check-in diário, streaks, desafios e feed social." />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#000000" />

    <!-- iOS PWA -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="FitRank" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.svg" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/icons/favicon.svg" />

    <!-- Preconnect Supabase -->
    <link rel="preconnect" href="https://pjlmemvwqhmpchiiqtol.supabase.co" />

    <!-- iOS Splash Screens -->
    <link rel="apple-touch-startup-image"
      media="(device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3)"
      href="/icons/icon-512.svg" />
    <link rel="apple-touch-startup-image"
      media="(device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3)"
      href="/icons/icon-512.svg" />
    <link rel="apple-touch-startup-image"
      media="(device-width: 428px) and (device-height: 926px) and (-webkit-device-pixel-ratio: 3)"
      href="/icons/icon-512.svg" />
    <link rel="apple-touch-startup-image"
      media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3)"
      href="/icons/icon-512.svg" />
    <link rel="apple-touch-startup-image"
      media="(device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3)"
      href="/icons/icon-512.svg" />
    <link rel="apple-touch-startup-image"
      media="(device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 2)"
      href="/icons/icon-512.svg" />

    <!-- Styled splash / prevent flash -->
    <style>
      html, body { background: #000; margin: 0; padding: 0; }
      #splash {
        position: fixed; inset: 0; z-index: 9999;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        background: #000;
        transition: opacity 0.3s ease-out;
      }
      #splash.hide { opacity: 0; pointer-events: none; }
      #splash .logo {
        font-size: 2.25rem; font-weight: 900; font-style: italic;
        letter-spacing: -0.05em; text-transform: uppercase;
        background: linear-gradient(to right, #4ade80, #16a34a);
        -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      #splash .sub {
        margin-top: 0.75rem; font-size: 0.75rem;
        color: #52525b; font-family: system-ui, sans-serif;
      }
      @keyframes splash-pulse {
        0%, 100% { opacity: 0.5; }
        50% { opacity: 1; }
      }
      #splash .dot {
        margin-top: 2rem; width: 6px; height: 6px;
        border-radius: 50%; background: #4ade80;
        animation: splash-pulse 1.2s ease-in-out infinite;
      }
    </style>
  </head>
  <body>
    <div id="splash">
      <div class="logo">FitRank</div>
      <div class="sub">Ranking fitness com amigos</div>
      <div class="dot"></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
